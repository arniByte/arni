# Render Blueprint — one-click deploy of KAO // 顔.
# In the Render dashboard: New + > Blueprint, point at this repo, and it reads
# this file. NODE_ENV is set to production by `npm start` (cross-env) at runtime,
# so the build still installs devDependencies (vite/typescript) it needs.
services:
  - type: web
    name: kao
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
