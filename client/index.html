    <script>
      // Apply the saved theme before first paint to avoid a flash. Default: light.
      try {
        document.documentElement.dataset.theme = localStorage.getItem('kao.theme') || 'light';
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
